<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLEXUS — Offline</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #18181B;
      color: #E4E4E7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 8px; }
    p { color: #A1A1AA; font-size: 0.9rem; max-width: 360px; line-height: 1.6; }
    button {
      margin-top: 24px;
      padding: 10px 24px;
      background: #1B3A5C;
      border: 1px solid #2563EB;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button:hover { background: #2563EB; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>
    PLEXUS can't reach the server right now. Your recent data has been cached
    and changes will sync automatically when you're back online.
  </p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
